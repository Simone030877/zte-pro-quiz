name: Auto-update cache version

on:
  push:
    branches: [ main ]
    paths:
      - 'ma_quante_ne_so_pro.html'
      - 'manifest.json'

jobs:
  update-sw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Update service worker cache version
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          sed -i "s/const CACHE_NAME = 'zte-pro-quiz-[0-9]*/const CACHE_NAME = 'zte-pro-quiz-$TIMESTAMP/" sw.js

      - name: Commit updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || (git pull --rebase && git commit -m "Auto-update cache version [skip ci]" && git push)
