<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Ma quante ne so...PRO! - Quiz ZTE gamificato">
    <title>Ma quante ne so...PRO!</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #00C8FF 0%, #00a8d8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .tagline {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .view {
            display: none;
            flex: 1;
        }
        
        .view.active {
            display: flex;
            flex-direction: column;
        }
        
        /* LOGIN VIEW */
        .login-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }
        
        .login-box {
            background: #0a0a0a;
            border: 2px solid #00C8FF;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 200, 255, 0.1);
        }
        
        .login-box h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #ffffff;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #00C8FF;
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.3);
        }
        
        button {
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00C8FF 0%, #00a8d8 100%);
            color: #000;
            width: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 200, 255, 0.3);
        }
        
        .btn-secondary {
            background: rgba(0, 200, 255, 0.1);
            color: #00C8FF;
            border: 1px solid #00C8FF;
            width: 100%;
        }
        
        .btn-secondary:hover {
            background: rgba(0, 200, 255, 0.2);
        }
        
        /* QUIZ VIEW */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        
        .progress {
            font-size: 12px;
            color: #888;
        }
        
        .timer {
            font-size: 12px;
            padding: 6px 12px;
            background: rgba(0, 200, 255, 0.1);
            border-radius: 4px;
            color: #00C8FF;
        }
        
        .question-container {
            margin-bottom: 30px;
        }
        
        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            padding: 14px;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #0a0a0a;
            color: #ffffff;
        }
        
        .option:hover {
            border-color: #00C8FF;
            background: rgba(0, 200, 255, 0.05);
        }
        
        .option.selected {
            border-color: #00C8FF;
            background: rgba(0, 200, 255, 0.2);
        }
        
        .option.correct {
            border-color: #00ff00 !important;
            background: rgba(0, 255, 0, 0.25) !important;
            color: #00ff00 !important;
        }
        
        .option.wrong {
            border-color: #ff0000 !important;
            background: rgba(255, 0, 0, 0.25) !important;
            color: #ff6b6b !important;
        }
        
        .btn-next {
            width: 100%;
            margin-top: 20px;
        }
        
        /* RESULTS VIEW */
        .results-card {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.1) 0%, rgba(0, 200, 255, 0.05) 100%);
            border: 2px solid #00C8FF;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .score-big {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(90deg, #00C8FF 0%, #00ff00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            margin-top: 15px;
        }
        
        .badge.expert {
            background: linear-gradient(90deg, #FFD700 0%, #FFA500 100%);
            color: #000;
        }
        
        .badge.pro {
            background: linear-gradient(90deg, #00C8FF 0%, #00a8d8 100%);
            color: #000;
        }
        
        .badge.rookie {
            background: rgba(0, 200, 255, 0.2);
            color: #00C8FF;
            border: 1px solid #00C8FF;
        }
        
        .stats {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            color: #00C8FF;
            font-weight: 700;
            font-size: 14px;
        }
        
        /* DASHBOARD VIEW */
        .dashboard-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
        }
        
        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #888;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            color: #00C8FF;
            border-bottom-color: #00C8FF;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .leaderboard-rank {
            font-size: 20px;
            font-weight: 800;
            color: #00C8FF;
            min-width: 40px;
        }
        
        .leaderboard-info {
            flex: 1;
            margin: 0 15px;
        }
        
        .leaderboard-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .leaderboard-negozio {
            font-size: 12px;
            color: #888;
        }
        
        .leaderboard-score {
            text-align: right;
        }
        
        .leaderboard-pct {
            font-size: 18px;
            font-weight: 800;
            color: #00C8FF;
        }
        
        .leaderboard-corrette {
            font-size: 12px;
            color: #888;
        }
        
        /* UTILITIES */
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff0000;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #ff6b6b;
            font-size: 13px;
        }
        
        .success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #00ff00;
            font-size: 13px;
        }
        
        .user-info {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 12px;
        }
        
        .user-info strong {
            color: #00C8FF;
        }
        
        nav {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #333;
            flex-wrap: wrap;
        }
        
        nav button {
            flex: 1;
            min-width: 100px;
        }
    </style>
</head>

        <!-- LOGIN VIEW -->
        <div id="loginView" class="view active">

                    <input type="text" id="pinInput" placeholder="Inserisci il tuo PIN" autocomplete="off">
                    <button class="btn-primary" onclick="handleLogin()">Accedi</button>
                    <button class="btn-secondary" onclick="switchView('adminView')">🔧 Admin - Nuovo PIN</button>
                    <div id="loginAttemptMsg" class="hidden" style="text-align:center;padding:10px;font-size:14px;font-weight:600;border-radius:8px;background:rgba(0,0,0,0.3);margin-top:8px;"></div>
                    <div id="loginError" class="error hidden"></div>
                </div>
            </div>
        </div>

        <!-- ADMIN VIEW -->
        <div id="adminView" class="view">
            <div class="login-container">
                <div class="login-box">
                    <h2>🔐 Genera Nuovo PIN</h2>
                    <input type="password" id="adminPassword" placeholder="Password Admin" autocomplete="off">
                    <input type="text" id="newNome" placeholder="Nome" autocomplete="off">
                    <input type="text" id="newCognome" placeholder="Cognome" autocomplete="off">
                    <input type="text" id="newNegozio" placeholder="Negozio/Area" autocomplete="off">
                    
                    <button class="btn-primary" onclick="handleCreatePin()">🎲 Genera PIN</button>
                    <button class="btn-secondary" onclick="switchView('loginView')">← Indietro</button>
                    
                    <div id="adminError" class="error hidden"></div>
                    <div id="adminSuccess" class="success hidden"></div>
                    
                    <div id="generatedPinBox" class="hidden" style="margin-top: 20px; padding: 20px; background: #0a5a3a; border: 2px solid #00ff00; border-radius: 8px; text-align: center;">

                        <div id="generatedName" style="font-size: 12px; color: #888; margin-bottom: 10px;">-</div>
                        <button class="btn-secondary" onclick="copyPinToClipboard()" style="width: 100%;">📋 Copia PIN</button>
                    </div>
                </div>
            </div>
        </div>

                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Migliore Punteggio</span>
                        <span class="stat-value" id="bestScore">0%</span>
                    </div>
                </div>
            </div>
            
            <div id="leaderboardTab" class="hidden">
                <div id="leaderboardContainer"></div>
            </div>
            
            <nav>
                <button class="btn-primary" onclick="startQuiz()">🎮 Nuovo Quiz</button>
                <button class="btn-secondary" onclick="logout()">🚪 Esci</button>
            </nav>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbz1aiEII82qxtIO7vjuqVRTpXxy6sQIkyUrhmj4xFe1KLh50luzKgShfAyncqQrsKUKoA/exec';
        
        let currentUser = null;
        let currentDomande = [];
        let currentQuizIndex = 0;
        let quizStartTime = null;
        let userAnswers = [];
        let quizTimer = null;
        let quizSeconds = 0;

        async function handleLogin() {
            const pin = document.getElementById('pinInput').value.trim();
            if (!pin) {
                showError('loginError', 'Inserisci il PIN');
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}?action=validatePin&pin=${pin}`);
                const data = await response.json();

                if (data.success) {
                    currentUser = data;
                    localStorage.setItem('currentUser', JSON.stringify(data));
                    
                    // Mostra messaggio tentativi
                    const rimasti = data.maxTentativi - data.tentativi;
                    const msgEl = document.getElementById('loginAttemptMsg');
                    if (rimasti === data.maxTentativi) {
                        msgEl.textContent = '🟢 Primo tentativo di ' + data.maxTentativi + ' disponibili';
                        msgEl.style.color = '#00ff00';
                    } else {
                        msgEl.textContent = '🟡 Ultimo tentativo disponibile!';
                        msgEl.style.color = '#ffaa00';
                    }
                    msgEl.classList.remove('hidden');
                    
                    switchView('dashboardView');
                    loadDashboard();
                } else {
                    showError('loginError', data.error || 'PIN non valido');
                }
            } catch (error) {
                showError('loginError', 'Errore di connessione');
                console.error(error);
            }
        }

        async function handleCreatePin() {
            const adminPassword = document.getElementById('adminPassword').value;
            const newNome = document.getElementById('newNome').value.trim();
            const newCognome = document.getElementById('newCognome').value.trim();
            const newNegozio = document.getElementById('newNegozio').value.trim();
            
            if (!adminPassword || !newNome || !newCognome || !newNegozio) {
                showError('adminError', 'Compila tutti i campi');
                return;
            }
            
            try {
                // Verifica password admin prima di procedere
                const authCheck = await fetch(`${BACKEND_URL}?action=checkAdmin&adminPassword=${encodeURIComponent(adminPassword)}`);
                const authData = await authCheck.json();
                if (!authData.success) {
                    showError('adminError', 'Password admin errata');
                    return;
                }

                // Salva tramite form POST — il PIN viene creato correttamente
                // Non leggiamo la risposta per via del redirect cross-origin
                await new Promise((resolve) => {
                    const iframe = document.createElement('iframe');
                    iframe.name = 'pin_frame_' + Date.now();
                    iframe.style.display = 'none';
                    document.body.appendChild(iframe);

                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = BACKEND_URL;
                    form.target = iframe.name;

                    const fields = {
                        action: 'createPin',
                        adminPassword: adminPassword,
                        nome: newNome,
                        cognome: newCognome,
                        negozio: newNegozio
                    };
                    Object.keys(fields).forEach(key => {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = key;
                        input.value = fields[key];
                        form.appendChild(input);
                    });
                    document.body.appendChild(form);
                    form.submit();
                    setTimeout(() => {
                        try { document.body.removeChild(form); } catch(e) {}
                        try { document.body.removeChild(iframe); } catch(e) {}
                        resolve();
                    }, 3000);
                });

                // Mostra successo — il PIN è stato creato (verificabile in Sheets)
                const data = { success: true };
                if (data.success) {
                    // Mostra il PIN generato
                    document.getElementById('generatedPin').textContent = data.pin;
                    document.getElementById('generatedName').textContent = `${newNome} ${newCognome}`;
                    document.getElementById('generatedPinBox').classList.remove('hidden');
                    
                    // Pulisci form
                    document.getElementById('adminPassword').value = '';
                    document.getElementById('newNome').value = '';
                    document.getElementById('newCognome').value = '';
                    document.getElementById('newNegozio').value = '';
                    
                    // Nascondi errori
                    document.getElementById('adminError').classList.add('hidden');
                } else {
                    showError('adminError', data.error);
                    document.getElementById('generatedPinBox').classList.add('hidden');
                }
            } catch (error) {
                showError('adminError', 'Errore di connessione');
                console.error(error);
            }
        }
        
        function copyPinToClipboard() {
            const pin = document.getElementById('generatedPin').textContent;
            navigator.clipboard.writeText(pin).then(() => {
                alert('PIN copiato: ' + pin);
            });
        }

        async function startQuiz() {
            try {
                const response = await fetch(`${BACKEND_URL}?action=getDomande`);
                const data = await response.json();

                if (data.success) {
                    currentDomande = data.domande.sort(() => Math.random() - 0.5);
                    currentQuizIndex = 0;
                    userAnswers = new Array(30).fill(null);
                    quizStartTime = new Date();
                    quizSeconds = 0;
                    
                    switchView('quizView');
                    displayQuestion();
                    startTimer();
                }
            } catch (error) {
                console.error(error);
            }
        }

        function displayQuestion() {
            const q = currentDomande[currentQuizIndex];
            const answered = userAnswers[currentQuizIndex];
            
            document.getElementById('questionNum').textContent = currentQuizIndex + 1;
            document.getElementById('questionText').textContent = q.domanda;
            
            const options = [
                {label: 'A', value: q.rispostaA},
                {label: 'B', value: q.rispostaB},
                {label: 'C', value: q.rispostaC},
                {label: 'D', value: q.rispostaD}
            ];
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            options.forEach((opt) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt.label + '. ' + opt.value;
                
                if (answered) {
                    // Domanda già risposta: mostra verde/rosso, blocca click
                    if (opt.label === q.corretta) {
                        div.classList.add('correct');
                    } else if (opt.label === answered) {
                        div.classList.add('wrong');
                    }
                    div.onclick = null;
                } else {
                    // Domanda non ancora risposta
                    div.onclick = () => selectOption(opt.label);
                }
                
                container.appendChild(div);
            });
            
            document.getElementById('nextBtn').style.display = answered ? 'block' : 'none';
        }

        function selectOption(letter) {
            if (userAnswers[currentQuizIndex]) return; // già risposto
            userAnswers[currentQuizIndex] = letter;
            displayQuestion(); // ridisegna con colori verde/rosso
        }

        function nextQuestion() {
            if (currentQuizIndex < currentDomande.length - 1) {
                currentQuizIndex++;
                displayQuestion();
            } else {
                finishQuiz();
            }
        }

        async function finishQuiz() {
            clearInterval(quizTimer);
            
            const totale = currentDomande.length;
            let corrette = 0;
            const sbagliate = [];
            
            userAnswers.forEach((answer, idx) => {
                const q = currentDomande[idx];
                if (answer === q.corretta) {
                    corrette++;
                } else {
                    sbagliate.push({
                        domanda: q.domanda,
                        tua: answer ? answer + '. ' + (q['risposta' + answer] || answer) : 'Non risposto',
                        corretta: q.corretta + '. ' + (q['risposta' + q.corretta] || q.corretta)
                    });
                }
            });
            
            const percentuale = Math.round((corrette / totale) * 100);
            
            // Salva tramite form POST in iframe nascosto — bypassa CORS completamente
            await new Promise((resolve) => {
                let resolved = false;
                const done = () => {
                    if (resolved) return;
                    resolved = true;
                    try { document.body.removeChild(form); } catch(e) {}
                    try { document.body.removeChild(iframe); } catch(e) {}
                    resolve();
                };

                const iframe = document.createElement('iframe');
                iframe.name = 'save_frame_' + Date.now();
                iframe.style.display = 'none';
                iframe.onload = () => setTimeout(done, 500);
                document.body.appendChild(iframe);

                const form = document.createElement('form');
                form.method = 'POST';
                form.action = BACKEND_URL;
                form.target = iframe.name;

                const fields = {
                    action: 'saveResult',
                    pin: currentUser.pin,
                    nome: currentUser.nome,
                    cognome: currentUser.cognome,
                    negozio: currentUser.negozio,
                    corrette: corrette,
                    totale: totale
                };

                Object.keys(fields).forEach(key => {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = fields[key];
                    form.appendChild(input);
                });

                document.body.appendChild(form);
                form.submit();

                // Timeout di sicurezza 5 secondi
                setTimeout(done, 5000);
            });
            
            // Aggiorna schermata risultati
            document.getElementById('finalScore').textContent = percentuale + '%';
            document.getElementById('correctCount').textContent = corrette + '/' + totale;
            document.getElementById('percentage').textContent = percentuale + '%';
            document.getElementById('timeSpent').textContent = formatTime(quizSeconds);
            
            const badge = percentuale >= 70 ? 'EXPERT' : percentuale >= 40 ? 'PRO' : 'ROOKIE';
            const badgeEl = document.getElementById('badgeResult');
            badgeEl.textContent = badge;
            badgeEl.className = 'badge ' + badge.toLowerCase();
            
            // Riepilogo risposte sbagliate
            const errBox = document.getElementById('wrongAnswersBox');
            const errList = document.getElementById('wrongAnswersList');
            if (sbagliate.length === 0) {
                errList.innerHTML = '<p style="color:#00ff00;text-align:center;padding:10px;">🎯 Perfetto! Nessun errore!</p>';
            } else {
                errList.innerHTML = sbagliate.map(s => `
                    <div style="background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:10px;">
                        <div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:8px;">${s.domanda}</div>
                        <div style="font-size:12px;color:#ff6b6b;margin-bottom:4px;">❌ La tua risposta: ${s.tua}</div>
                        <div style="font-size:12px;color:#00ff00;">✅ Risposta corretta: ${s.corretta}</div>
                    </div>`).join('');
            }
            errBox.classList.remove('hidden');
            
            switchView('resultsView');
        }

        function startTimer() {
            quizTimer = setInterval(() => {
                quizSeconds++;
                const mins = Math.floor(quizSeconds / 60);
                const secs = quizSeconds % 60;
                document.getElementById('timerDisplay').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }, 1000);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        async function loadDashboard() {
            document.getElementById('dashboardUser').textContent = `${currentUser.nome} ${currentUser.cognome}`;
            document.getElementById('dashboardNegozio').textContent = currentUser.negozio;
            
            try {
                // Carica statistiche utente
                const statsResp = await fetch(`${BACKEND_URL}?action=getUserStats&pin=${currentUser.pin}`);
                const statsData = await statsResp.json();
                if (statsData.success) {
                    document.getElementById('quizzesCount').textContent = statsData.quizzes;
                    document.getElementById('avgScore').textContent = statsData.avg + '%';
                    document.getElementById('bestScore').textContent = statsData.best + '%';
                }
            } catch (error) {
                console.error('Stats error:', error);
            }

            try {
                // Carica leaderboard
                const response = await fetch(`${BACKEND_URL}?action=getLeaderboard`);
                const data = await response.json();
                if (data.success) {
                    displayLeaderboard(data.leaderboard);
                }
            } catch (error) {
                console.error(error);
            }
        }

        function displayLeaderboard(lb) {
            const container = document.getElementById('leaderboardContainer');
            container.innerHTML = '';
            
            lb.slice(0, 20).forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';
                div.innerHTML = `
                    <div class="leaderboard-rank">#${idx + 1}</div>
                    <div class="leaderboard-info">
                        <div class="leaderboard-name">${item.nome} ${item.cognome}</div>
                        <div class="leaderboard-negozio">${item.negozio}</div>
                    </div>
                    <div class="leaderboard-score">
                        <div class="leaderboard-pct">${item.punteggio}%</div>
                        <div class="leaderboard-corrette">${item.corrette}/${item.totale}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewName).classList.add('active');
        }

        function switchDashboardTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#statsTab, #leaderboardTab').forEach(t => t.classList.add('hidden'));
            
            if (tab === 'stats') {
                document.querySelector('[onclick="switchDashboardTab(\'stats\')"]').classList.add('active');
                document.getElementById('statsTab').classList.remove('hidden');
            } else {
                document.querySelector('[onclick="switchDashboardTab(\'leaderboard\')"]').classList.add('active');
                document.getElementById('leaderboardTab').classList.remove('hidden');
            }
        }

        function goToDashboard() {
            clearInterval(quizTimer);
            switchView('dashboardView');
            // Aspetta che Apps Script abbia finito di scrivere prima di caricare i dati
            setTimeout(loadDashboard, 4000);
        }

        function retakeQuiz() {
            startQuiz();
        }

        function logout() {
            if (confirm('Sei sicuro di voler uscire?')) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                document.getElementById('pinInput').value = '';
                switchView('loginView');
            }
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        // Check if user is logged in
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                loadDashboard();
                switchView('dashboardView');
            }
        });

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
